<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard Flip Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-light: #25253d;
      --accent: #7c5cfc;
      --accent-light: #9b82fc;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e2f0;
      --text-muted: #8888a4;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── Header ─────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 900px;
      padding: 32px 24px 0;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-light), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ─── Stats Bar ──────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 24px 0 16px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--surface-light);
      border-radius: 12px;
      padding: 10px 20px;
      text-align: center;
      min-width: 100px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value.correct { color: var(--green); }
    .stat-value.wrong { color: var(--red); }
    .stat-value.remaining { color: var(--yellow); }

    /* ─── Progress Bar ───────────────────────────────── */
    .progress-container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 28px;
      padding: 0 24px;
    }

    .progress-track {
      height: 6px;
      background: var(--surface-light);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 3px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ─── Card Area ───────────────────────────────────── */
    .card-area {
      perspective: 1000px;
      width: 100%;
      max-width: 520px;
      height: 300px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      border: 1px solid var(--surface-light);
    }

    .card-front {
      background: linear-gradient(145deg, var(--surface), var(--surface-light));
    }

    .card-back {
      background: linear-gradient(145deg, #1e1e3a, #2a2a4a);
      transform: rotateY(180deg);
    }

    .card-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-light);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .card-text {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.5;
    }

    .card-hint {
      position: absolute;
      bottom: 16px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ─── Answer Buttons ─────────────────────────────── */
    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 28px;
      padding: 0 24px;
    }

    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    .btn-correct {
      background: var(--green);
      color: #064e3b;
      box-shadow: 0 4px 20px rgba(52, 211, 153, 0.3);
    }

    .btn-wrong {
      background: var(--red);
      color: #7f1d1d;
      box-shadow: 0 4px 20px rgba(248, 113, 113, 0.3);
    }

    .btn-skip {
      background: var(--surface-light);
      color: var(--text-muted);
    }

    /* ─── Deck Selector ──────────────────────────────── */
    .deck-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 20px 0 8px;
      flex-wrap: wrap;
      padding: 0 24px;
    }

    .deck-btn {
      padding: 8px 18px;
      border: 1px solid var(--surface-light);
      border-radius: 20px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .deck-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .deck-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ─── Results Screen ─────────────────────────────── */
    .results {
      text-align: center;
      padding: 40px 24px;
      max-width: 500px;
      margin: 0 auto;
    }

    .results h2 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .results .score-big {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-light), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 16px 0;
    }

    .results p {
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .btn-restart {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124, 92, 252, 0.3);
    }

    /* ─── Custom Cards Form ──────────────────────────── */
    .custom-form {
      width: 100%;
      max-width: 520px;
      margin: 12px auto 0;
      padding: 0 24px;
    }

    .custom-toggle {
      background: transparent;
      border: 1px dashed var(--surface-light);
      border-radius: 12px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 10px 20px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }

    .custom-toggle:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .custom-inputs {
      display: none;
      margin-top: 12px;
    }

    .custom-inputs.visible {
      display: block;
    }

    .custom-inputs textarea {
      width: 100%;
      height: 100px;
      background: var(--surface);
      border: 1px solid var(--surface-light);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 14px;
      resize: vertical;
      outline: none;
    }

    .custom-inputs textarea:focus {
      border-color: var(--accent);
    }

    .custom-inputs .help {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 6px 0 10px;
    }

    .btn-add-deck {
      background: var(--accent);
      color: #fff;
      padding: 8px 20px;
      font-size: 0.85rem;
    }

    /* ─── Shake animation ────────────────────────────── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.4s ease;
    }

    /* ─── Pop animation ──────────────────────────────── */
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .pop {
      animation: pop 0.3s ease;
    }

    /* ─── Responsive ─────────────────────────────────── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .card-area { height: 250px; }
      .card-text { font-size: 1.05rem; }
      .btn { padding: 10px 22px; font-size: 0.85rem; }
      .stat { min-width: 80px; padding: 8px 14px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Flashcard Flip</h1>
    <p>Tap a card to reveal the answer, then rate yourself</p>
  </header>

  <!-- Deck selector -->
  <div class="deck-selector" id="deckSelector"></div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat">
      <div class="stat-value correct" id="correctCount">0</div>
      <div class="stat-label">Correct</div>
    </div>
    <div class="stat">
      <div class="stat-value wrong" id="wrongCount">0</div>
      <div class="stat-label">Wrong</div>
    </div>
    <div class="stat">
      <div class="stat-value remaining" id="remainingCount">0</div>
      <div class="stat-label">Remaining</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-container">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Card -->
  <div class="card-area" id="cardArea">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-label">Question</div>
        <div class="card-text" id="frontText"></div>
        <div class="card-hint">Click to reveal answer</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">Answer</div>
        <div class="card-text" id="backText"></div>
        <div class="card-hint">Rate your answer below</div>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="actions" id="actions">
    <button class="btn btn-wrong" id="btnWrong" disabled onclick="answer(false)">Incorrect</button>
    <button class="btn btn-skip" id="btnSkip" onclick="skipCard()">Skip</button>
    <button class="btn btn-correct" id="btnCorrect" disabled onclick="answer(true)">Got it!</button>
  </div>

  <!-- Results -->
  <div class="results" id="results" style="display: none;"></div>

  <!-- Custom card form -->
  <div class="custom-form">
    <button class="custom-toggle" onclick="toggleCustom()">+ Add your own cards</button>
    <div class="custom-inputs" id="customInputs">
      <textarea id="customText" placeholder="Front | Back&#10;What is HTML? | HyperText Markup Language&#10;What is CSS? | Cascading Style Sheets"></textarea>
      <div class="help">One card per line. Separate front and back with a pipe <strong>|</strong></div>
      <button class="btn btn-add-deck" onclick="addCustomDeck()">Create Deck</button>
    </div>
  </div>

  <script>
    // ─── Flashcard Decks ──────────────────────────────────────
    const decks = {
      "World Capitals": [
        { q: "What is the capital of France?", a: "Paris" },
        { q: "What is the capital of Japan?", a: "Tokyo" },
        { q: "What is the capital of Brazil?", a: "Brasilia" },
        { q: "What is the capital of Australia?", a: "Canberra" },
        { q: "What is the capital of Canada?", a: "Ottawa" },
        { q: "What is the capital of Egypt?", a: "Cairo" },
        { q: "What is the capital of South Korea?", a: "Seoul" },
        { q: "What is the capital of Argentina?", a: "Buenos Aires" },
        { q: "What is the capital of Thailand?", a: "Bangkok" },
        { q: "What is the capital of Germany?", a: "Berlin" },
      ],
      "Science": [
        { q: "What planet is known as the Red Planet?", a: "Mars" },
        { q: "What gas do plants absorb from the atmosphere?", a: "Carbon dioxide (CO2)" },
        { q: "What is the chemical symbol for water?", a: "H2O" },
        { q: "What is the speed of light?", a: "~300,000 km/s (186,000 mi/s)" },
        { q: "What is the powerhouse of the cell?", a: "Mitochondria" },
        { q: "What element has the atomic number 1?", a: "Hydrogen" },
        { q: "What is the largest organ in the human body?", a: "Skin" },
        { q: "What force keeps us on the ground?", a: "Gravity" },
      ],
      "Vocabulary": [
        { q: "What does 'ephemeral' mean?", a: "Lasting for a very short time" },
        { q: "What does 'ubiquitous' mean?", a: "Present, appearing, or found everywhere" },
        { q: "What does 'pragmatic' mean?", a: "Dealing with things in a practical way" },
        { q: "What does 'eloquent' mean?", a: "Fluent or persuasive in speaking or writing" },
        { q: "What does 'resilient' mean?", a: "Able to recover quickly from difficulties" },
        { q: "What does 'ambiguous' mean?", a: "Open to more than one interpretation" },
        { q: "What does 'benevolent' mean?", a: "Well-meaning and kindly" },
        { q: "What does 'candid' mean?", a: "Truthful and straightforward; frank" },
      ],
      "Math": [
        { q: "What is the value of Pi (to 2 decimals)?", a: "3.14" },
        { q: "What is the square root of 144?", a: "12" },
        { q: "What is 7 x 8?", a: "56" },
        { q: "What is a triangle with all equal sides called?", a: "Equilateral triangle" },
        { q: "How many degrees in a circle?", a: "360 degrees" },
        { q: "What is 15% of 200?", a: "30" },
        { q: "What is the formula for the area of a circle?", a: "A = \u03C0r\u00B2" },
        { q: "What is 2 to the power of 10?", a: "1024" },
      ],
    };

    // ─── Game State ────────────────────────────────────────────
    let currentDeck = "World Capitals";
    let cards = [];
    let currentIndex = 0;
    let correct = 0;
    let wrong = 0;
    let isFlipped = false;

    // ─── DOM refs ──────────────────────────────────────────────
    const card = document.getElementById("card");
    const frontText = document.getElementById("frontText");
    const backText = document.getElementById("backText");
    const btnCorrect = document.getElementById("btnCorrect");
    const btnWrong = document.getElementById("btnWrong");
    const btnSkip = document.getElementById("btnSkip");
    const correctEl = document.getElementById("correctCount");
    const wrongEl = document.getElementById("wrongCount");
    const remainingEl = document.getElementById("remainingCount");
    const progressFill = document.getElementById("progressFill");
    const cardArea = document.getElementById("cardArea");
    const actionsEl = document.getElementById("actions");
    const resultsEl = document.getElementById("results");
    const statsBar = document.getElementById("statsBar");

    // ─── Keyboard support ──────────────────────────────────────
    document.addEventListener("keydown", (e) => {
      if (resultsEl.style.display !== "none") return;

      if (e.code === "Space" || e.code === "Enter") {
        e.preventDefault();
        flipCard();
      } else if (e.code === "ArrowLeft" && isFlipped) {
        answer(false);
      } else if (e.code === "ArrowRight" && isFlipped) {
        answer(true);
      } else if (e.code === "ArrowDown") {
        skipCard();
      }
    });

    // ─── Build deck buttons ────────────────────────────────────
    function renderDeckButtons() {
      const container = document.getElementById("deckSelector");
      container.innerHTML = "";
      Object.keys(decks).forEach((name) => {
        const btn = document.createElement("button");
        btn.className = "deck-btn" + (name === currentDeck ? " active" : "");
        btn.textContent = name;
        btn.onclick = () => switchDeck(name);
        container.appendChild(btn);
      });
    }

    function switchDeck(name) {
      currentDeck = name;
      renderDeckButtons();
      startGame();
    }

    // ─── Shuffle ───────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ─── Start / Reset ────────────────────────────────────────
    function startGame() {
      cards = shuffle(decks[currentDeck]);
      currentIndex = 0;
      correct = 0;
      wrong = 0;
      isFlipped = false;

      card.classList.remove("flipped");
      cardArea.style.display = "";
      actionsEl.style.display = "";
      statsBar.style.display = "";
      resultsEl.style.display = "none";

      updateStats();
      showCard();
    }

    // ─── Show current card ─────────────────────────────────────
    function showCard() {
      if (currentIndex >= cards.length) {
        showResults();
        return;
      }
      isFlipped = false;
      card.classList.remove("flipped");
      btnCorrect.disabled = true;
      btnWrong.disabled = true;

      const c = cards[currentIndex];
      frontText.textContent = c.q;
      backText.textContent = c.a;
    }

    // ─── Flip ──────────────────────────────────────────────────
    function flipCard() {
      if (currentIndex >= cards.length) return;
      isFlipped = !isFlipped;
      card.classList.toggle("flipped");
      if (isFlipped) {
        btnCorrect.disabled = false;
        btnWrong.disabled = false;
      } else {
        btnCorrect.disabled = true;
        btnWrong.disabled = true;
      }
    }

    // ─── Answer ────────────────────────────────────────────────
    function answer(wasCorrect) {
      if (!isFlipped) return;

      if (wasCorrect) {
        correct++;
        cardArea.classList.add("pop");
        setTimeout(() => cardArea.classList.remove("pop"), 300);
      } else {
        wrong++;
        cardArea.classList.add("shake");
        setTimeout(() => cardArea.classList.remove("shake"), 400);
      }

      currentIndex++;
      updateStats();

      setTimeout(() => showCard(), 350);
    }

    // ─── Skip ──────────────────────────────────────────────────
    function skipCard() {
      if (currentIndex >= cards.length) return;
      // move current card to end
      cards.push(cards[currentIndex]);
      cards.splice(currentIndex, 1);
      isFlipped = false;
      card.classList.remove("flipped");
      showCard();
    }

    // ─── Update Stats ──────────────────────────────────────────
    function updateStats() {
      const total = cards.length;
      const remaining = total - currentIndex;
      correctEl.textContent = correct;
      wrongEl.textContent = wrong;
      remainingEl.textContent = remaining;
      const pct = total > 0 ? ((currentIndex) / total) * 100 : 0;
      progressFill.style.width = pct + "%";
    }

    // ─── Results ───────────────────────────────────────────────
    function showResults() {
      cardArea.style.display = "none";
      actionsEl.style.display = "none";

      const total = correct + wrong;
      const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
      progressFill.style.width = "100%";

      let emoji, message;
      if (pct === 100) { emoji = "&#127942;"; message = "Perfect score! You're a master!"; }
      else if (pct >= 80) { emoji = "&#11088;"; message = "Great job! Almost perfect!"; }
      else if (pct >= 60) { emoji = "&#128170;"; message = "Good effort! Keep practicing!"; }
      else { emoji = "&#128218;"; message = "Keep studying, you'll get there!"; }

      resultsEl.style.display = "block";
      resultsEl.innerHTML = `
        <h2>${emoji} Round Complete!</h2>
        <div class="score-big">${pct}%</div>
        <p>${correct} correct out of ${total} cards &mdash; ${message}</p>
        <button class="btn btn-restart" onclick="startGame(); resultsEl.style.display='none';">
          Play Again
        </button>
      `;
    }

    // ─── Custom Deck ───────────────────────────────────────────
    function toggleCustom() {
      document.getElementById("customInputs").classList.toggle("visible");
    }

    function addCustomDeck() {
      const raw = document.getElementById("customText").value.trim();
      if (!raw) return;

      const lines = raw.split("\n").filter(l => l.includes("|"));
      if (lines.length === 0) return;

      const newCards = lines.map(line => {
        const [front, ...rest] = line.split("|");
        return { q: front.trim(), a: rest.join("|").trim() };
      });

      const name = "Custom " + (Object.keys(decks).filter(k => k.startsWith("Custom")).length + 1);
      decks[name] = newCards;
      currentDeck = name;

      document.getElementById("customText").value = "";
      document.getElementById("customInputs").classList.remove("visible");

      renderDeckButtons();
      startGame();
    }

    // ─── Init ──────────────────────────────────────────────────
    renderDeckButtons();
    startGame();
  </script>
</body>
</html>
